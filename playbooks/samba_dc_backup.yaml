---
# Dispatcher for Samba DC backup and restore operations.
# Invokable by FQCN: ansible-playbook lineadicomando.samba_ad_dc.samba_dc_backup
#
#   ansible-playbook lineadicomando.samba_ad_dc.samba_dc_backup \
#     -e '{"target_hosts":"samba-ad-dc","samba_dc_backup_action":"backup",
#          "samba_dc_backup_targetdir":"/srv/backups"}'
#
# target_hosts: limit execution to specific hosts/groups (default: all)

- name: Samba DC backup/restore dispatcher
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true
  tasks:
    - name: Run samba_dc_backup
      ansible.builtin.import_role:
        name: lineadicomando.samba_ad_dc.samba_dc_backup
