---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core and ansible-lint
        run: pip install "ansible-core>=2.15" "ansible-lint"

      - name: Install collection dependencies
        run: ansible-galaxy collection install community.general microsoft.ad

      - name: Run ansible-lint
        run: ansible-lint
