---
- name: Install Samba and dependencies without interaction
  ansible.builtin.apt:
    update_cache: true
    name:
      - samba
      - winbind
      - libnss-winbind
      - krb5-user
      - smbclient
      - ldb-tools
      - python3-cryptography
    state: present
    install_recommends: true
    force_apt_get: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Hiding Samba and Winbind Services
  ansible.builtin.systemd:
    name: "{{ samba_ad_dc_svc_item }}"
    masked: true
  loop:
    - winbind
    - nmbd
    - smbd
  loop_control:
    loop_var: samba_ad_dc_svc_item

- name: Check if Samba is already configured as a domain controller
  ansible.builtin.shell: |
    grep -m1 "server role" /etc/samba/smb.conf | cut -d'=' -f2 | xargs
  register: smb_check
  failed_when: false
  changed_when: false

- name: Set operating variables
  ansible.builtin.set_fact:
    samba_ad_dc_setup: "{{ 'active directory domain controller' not in smb_check.stdout }}"

- name: Stop any active services
  ansible.builtin.systemd:
    name: "{{ samba_ad_dc_svc_item }}"
    state: stopped
  loop:
    - samba
    - winbind
    - nmbd
    - smbd
  loop_control:
    loop_var: samba_ad_dc_svc_item
  when: samba_ad_dc_setup

- name: Removes any samba files before provisioning the domain controller
  ansible.builtin.shell: |
    set -o pipefail
    DB_DIRS=$(smbd -b | grep -E "LOCKDIR|STATEDIR|CACHEDIR|PRIVATE_DIR" | cut -d":" -f2)
    FOUND_FILES=0
    REMOVED_FILES=0

    for DB_DIR in $DB_DIRS; do
      for EXT in tdb ldb; do
        FILES=$(find "$DB_DIR" -maxdepth 1 -type f -name "*.${EXT}" 2>/dev/null)
        if [[ -n "$FILES" ]]; then
          FOUND_FILES=1
          rm -f $FILES
          REMAINING=$(find "$DB_DIR" -maxdepth 1 -type f -name "*.${EXT}" 2>/dev/null)
          if [[ -z "$REMAINING" ]]; then
            REMOVED_FILES=1
          fi
        fi
      done
    done

    if [[ "$FOUND_FILES" -eq 1 && "$REMOVED_FILES" -eq 1 ]]; then
      echo "changed"
    elif [[ "$FOUND_FILES" -eq 1 && "$REMOVED_FILES" -eq 0 ]]; then
      echo "failed"
    fi
  args:
    executable: /bin/bash
  register: samba_ad_dc_cleanup_result
  changed_when: "'changed' in samba_ad_dc_cleanup_result.stdout"
  failed_when: "'failed' in samba_ad_dc_cleanup_result.stdout"
  when: samba_ad_dc_setup

- name: Copy smb.conf to smb.conf.dist if it doesn't already exist
  ansible.builtin.copy:
    src: /etc/samba/smb.conf
    dest: /etc/samba/smb.conf.dist
    remote_src: true
    force: false

- name: Delete the samba configuration file if necessary
  ansible.builtin.file:
    path: /etc/samba/smb.conf
    state: absent
  when: samba_ad_dc_setup

- name: Samba domain provisioning
  ansible.builtin.shell: |
    samba-tool domain provision --realm={{ samba_ad_dc_realm }} --domain={{ samba_ad_dc_domain }} --server-role=dc --use-rfc2307 --adminpass="$SAMBA_ADMIN_PASS"
  environment:
    SAMBA_ADMIN_PASS: "{{ samba_ad_dc_administrator_passwd }}"
  no_log: true
  when: samba_ad_dc_setup
  args:
    creates: /etc/samba/smb.conf
  notify: samba_ad_dc reboot

- name: Set registry shares in smb.conf
  ansible.builtin.lineinfile:
    path: /etc/samba/smb.conf
    insertafter: '^\[global\]'
    regexp: '^\s*registry shares\s*='
    line: "\tregistry shares = yes"

- name: Unmask samba-ad-dc service
  ansible.builtin.systemd:
    name: samba-ad-dc
    masked: false
