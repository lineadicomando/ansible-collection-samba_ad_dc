---
# defaults file for samba_ad_dc
# Tutti i valori devono essere forniti dall'inventario (host_vars).
# Nessun valore concreto qui — il role fallisce esplicitamente se mancano.

build_dc_realm: ~
build_dc_domain: ~
build_dc_fqdn: ~
build_dc_search_domain: ~
build_dc_nameserver: ~
build_dc_address: ~
build_dc_netmask: ~
build_dc_gateway: ~
build_dc_ifname: enp1s0
build_dc_ntp_server: ~
build_dc_ntp_allow_network: ~
build_dc_administrator_passwd: "{{ ansible_password }}"
build_dc_administrator_username: admin
