---
- name: Assert required variables
  ansible.builtin.assert:
    that:
      - win_join_state in ['domain', 'workgroup']
      - win_join_realm | default("", true) | length > 0
      - win_join_search_domain | default("", true) | length > 0
      - win_join_administrator_username | default("", true) | length > 0
      - win_join_administrator_passwd | default("", true) | length > 0
    fail_msg: |
      Missing or invalid variables in the win_join role.
      win_join_state must be 'domain' or 'workgroup' (current: {{ win_join_state }}).
      Required in group_vars/all: win_join_realm, win_join_search_domain,
      win_join_administrator_username, win_join_administrator_passwd.
    quiet: true

- name: "Manage domain membership — {{ win_join_realm }}"
  microsoft.ad.membership:
    dns_domain_name: "{{ win_join_search_domain }}"
    domain_admin_user: "{{ win_join_administrator_username }}@{{ win_join_realm }}"
    domain_admin_password: "{{ win_join_administrator_passwd }}"
    state: "{{ win_join_state }}"
    reboot: "{{ win_join_reboot }}"
    workgroup_name: "{{ win_join_workgroup }}"
  no_log: true
