---
- name: Assert required variables
  ansible.builtin.assert:
    that:
      - win_join_state in ['domain', 'workgroup']
      - samba_ad_dc_realm | default("", true) | length > 0
      - samba_ad_dc_search_domain | default("", true) | length > 0
      - samba_ad_dc_administrator_username | default("", true) | length > 0
      - samba_ad_dc_administrator_passwd | default("", true) | length > 0
    fail_msg: |
      Missing or invalid variables in the win_join role.
      win_join_state must be 'domain' or 'workgroup' (current: {{ win_join_state }}).
      Required in group_vars/all: samba_ad_dc_realm, samba_ad_dc_search_domain,
      samba_ad_dc_administrator_username, samba_ad_dc_administrator_passwd.
    quiet: true

- name: "{{ 'Join' if win_join_state == 'domain' else 'Leave' }} domain {{ samba_ad_dc_realm }}"
  microsoft.ad.membership:
    dns_domain_name: "{{ samba_ad_dc_search_domain }}"
    domain_admin_user: "{{ samba_ad_dc_administrator_username }}@{{ samba_ad_dc_realm }}"
    domain_admin_password: "{{ samba_ad_dc_administrator_passwd }}"
    state: "{{ win_join_state }}"
    reboot: "{{ win_join_reboot }}"
    workgroup_name: "{{ win_join_workgroup }}"
  no_log: true
