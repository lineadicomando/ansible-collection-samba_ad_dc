---
# User operations.
#   read-only : list, show          -> generic executor
#   mutating  : create/present, delete/absent, enable, disable, setpassword
#               -> idempotent samba_tool_user module

- name: Validate user action
  ansible.builtin.assert:
    that: samba_tool_action in _samba_tool_user_actions
    fail_msg: >-
      Unsupported user action '{{ samba_tool_action }}'.
      Valid: {{ _samba_tool_user_actions }}.
    quiet: true
  vars:
    _samba_tool_user_actions:
      - list
      - show
      - create
      - present
      - delete
      - absent
      - enable
      - disable
      - setpassword
      - setprimarygroup

- name: Read-only user operations
  when: samba_tool_action in ['list', 'show']
  block:
    - name: Build argv for user {{ samba_tool_action }}
      ansible.builtin.set_fact:
        _samba_tool_argv: >-
          {{ ['user', samba_tool_action]
             + ([samba_tool_args.name] if samba_tool_action == 'show' else []) }}

    - name: Run read-only user command
      ansible.builtin.include_tasks: _run.yaml

- name: Mutating user operations
  when: samba_tool_action not in ['list', 'show']
  lineadicomando.samba_ad_dc.samba_tool_user:
    name: "{{ samba_tool_args.name }}"
    state: "{{ 'absent' if samba_tool_action in ['delete', 'absent'] else 'present' }}"
    password: "{{ samba_tool_args.password | default(omit) }}"
    update_password: "{{ 'always' if samba_tool_action == 'setpassword' else 'on_create' }}"
    enabled: >-
      {{ true if samba_tool_action == 'enable'
         else false if samba_tool_action == 'disable'
         else samba_tool_args.enabled | default(omit) }}
    given_name: "{{ samba_tool_args.given_name | default(omit) }}"
    surname: "{{ samba_tool_args.surname | default(omit) }}"
    mail: "{{ samba_tool_args.mail | default(omit) }}"
    description: "{{ samba_tool_args.description | default(omit) }}"
    job_title: "{{ samba_tool_args.job_title | default(omit) }}"
    department: "{{ samba_tool_args.department | default(omit) }}"
    company: "{{ samba_tool_args.company | default(omit) }}"
    ou: "{{ samba_tool_args.ou | default(omit) }}"
    must_change_password: "{{ samba_tool_args.must_change_password | default(omit) }}"
    primary_group: "{{ samba_tool_args.primary_group | default(omit) }}"
    sam_ldb_path: "{{ samba_tool_args.sam_ldb_path | default(omit) }}"
    samba_tool_path: "{{ samba_tool_bin if samba_tool_bin != 'samba-tool' else omit }}"
  no_log: "{{ samba_tool_no_log }}"
