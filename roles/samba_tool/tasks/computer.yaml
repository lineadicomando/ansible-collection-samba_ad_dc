---
# Computer account operations.
#   read-only : list, show
#   mutating  : create, delete/absent  (idempotent via existence check)

- name: Validate computer action
  ansible.builtin.assert:
    that: samba_tool_action in _samba_tool_computer_actions
    fail_msg: >-
      Unsupported computer action '{{ samba_tool_action }}'.
      Valid: {{ _samba_tool_computer_actions }}.
    quiet: true
  vars:
    _samba_tool_computer_actions:
      - list
      - show
      - create
      - delete
      - absent

- name: Read-only computer operations
  when: samba_tool_action in ['list', 'show']
  block:
    - name: Build argv for computer {{ samba_tool_action }}
      ansible.builtin.set_fact:
        _samba_tool_argv: >-
          {{ ['computer', samba_tool_action]
             + ([samba_tool_args.name] if samba_tool_action == 'show' else []) }}

    - name: Run read-only computer command
      ansible.builtin.include_tasks: _run.yaml

- name: Ensure computer present or absent
  when: samba_tool_action in ['create', 'delete', 'absent']
  block:
    - name: "Check whether computer account exists: {{ samba_tool_args.name }}"
      ansible.builtin.command:
        argv: "{{ [samba_tool_bin, 'computer', 'show', samba_tool_args.name] }}"
      register: _samba_tool_computer_show
      changed_when: false
      failed_when: false

    - name: Create computer {{ samba_tool_args.name }}
      ansible.builtin.command:
        argv: "{{ [samba_tool_bin, 'computer', 'create', samba_tool_args.name] }}"
      when:
        - samba_tool_action == 'create'
        - _samba_tool_computer_show.rc != 0
      changed_when: true

    - name: Delete computer {{ samba_tool_args.name }}
      ansible.builtin.command:
        argv: "{{ [samba_tool_bin, 'computer', 'delete', samba_tool_args.name] }}"
      when:
        - samba_tool_action in ['delete', 'absent']
        - _samba_tool_computer_show.rc == 0
      changed_when: true
