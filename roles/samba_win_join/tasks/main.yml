---
- name: Assert required variables
  ansible.builtin.assert:
    that:
      - samba_win_join_state in ['domain', 'workgroup']
      - samba_win_join_realm | default("", true) | length > 0
      - samba_win_join_search_domain | default("", true) | length > 0
      - samba_win_join_administrator_username | default("", true) | length > 0
      - samba_win_join_administrator_passwd | default("", true) | length > 0
    fail_msg: |
      Missing or invalid variables in the samba_win_join role.
      samba_win_join_state must be 'domain' or 'workgroup' (current: {{ samba_win_join_state }}).
      Required in group_vars/all: samba_win_join_realm, samba_win_join_search_domain,
      samba_win_join_administrator_username, samba_win_join_administrator_passwd.
    quiet: true

- name: "Manage domain membership — {{ samba_win_join_realm }}"
  microsoft.ad.membership:
    dns_domain_name: "{{ samba_win_join_search_domain }}"
    domain_admin_user: "{{ samba_win_join_administrator_username }}@{{ samba_win_join_realm }}"
    domain_admin_password: "{{ samba_win_join_administrator_passwd }}"
    state: "{{ samba_win_join_state }}"
    reboot: "{{ samba_win_join_reboot }}"
    workgroup_name: "{{ samba_win_join_workgroup }}"
  no_log: true
